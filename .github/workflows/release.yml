name: MediaHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish MediaHub release
    runs-on: windows-latest
    
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow reportlab python-docx markdown

      - name: Install Inno Setup
        run: |
          choco install innosetup --yes

      - name: Build release packages
        shell: pwsh
        run: |
          chcp 65001
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $env:PYTHONUTF8 = "1"
          $env:PYTHONIOENCODING = "utf-8"
          python build_release.py

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MediaHub-Release-${{ github.ref_name }}
          path: |
            release/MediaHub_Setup_${{ github.ref_name }}.exe
            release/MediaHub_${{ github.ref_name }}_Portable.zip
            release/MediaHub_${{ github.ref_name }}_Setup.zip
            release/MediaHub_${{ github.ref_name }}_Handbuecher.zip
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: MediaHub ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'test') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: |
            release/MediaHub_Setup_${{ github.ref_name }}.exe
            release/MediaHub_${{ github.ref_name }}_Portable.zip
            release/MediaHub_${{ github.ref_name }}_Setup.zip
            release/MediaHub_${{ github.ref_name }}_Handbuecher.zip